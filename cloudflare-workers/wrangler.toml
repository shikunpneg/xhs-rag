binding = "KV_CONFIG"
id = "ef8dfb73acbf4430a4a5e85828c89d46"
preview_id = "ef8dfb73acbf4430a4a5e85828c89d46"

# Cron定时任务配置（每天凌晨2点运行）
[triggers]
crons = [
  "0 2 * * *"
]

