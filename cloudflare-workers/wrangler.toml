# 静态文件目录
[assets]
bucket_name = "public"
directory = "./public"

# Vectorize向量数据库配置
[[vectorize]]
binding = "VECTORIZE"
index_name = "xhs-embeddings-v2"

# Workers AI配置
[ai]
binding = "AI"

# Browser Rendering配置
[browser]
binding = "BROWSER"

# KV命名空间配置（用于存储Cookie和配置）
